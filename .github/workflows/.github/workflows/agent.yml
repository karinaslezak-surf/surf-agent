name: Daily Surf Agent

on:
  schedule:
    - cron: '0 6 * * *' # Runs at 06:00 UTC (08:00 AM in CH/AT)
  workflow_dispatch: # Allows you to click a "Run Now" button to test it

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Agent
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python agent.py
